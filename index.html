<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCG&times;AI PROJECT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0a0a0f;
      overflow-x: hidden;
    }

    .font-orbitron { font-family: 'Orbitron', sans-serif; }

    /* Animated background grid */
    .bg-grid {
      background-image:
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      pointer-events: none;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* Card glow effects */
    .card-disney {
      --glow: #a855f7;
      --glow-rgb: 168, 85, 247;
    }
    .card-gundam {
      --glow: #ef4444;
      --glow-rgb: 239, 68, 68;
    }
    .card-onepiece {
      --glow: #f59e0b;
      --glow-rgb: 245, 158, 11;
    }
    .card-pokemon {
      --glow: #22d3ee;
      --glow-rgb: 34, 211, 238;
    }

    .game-card {
      position: relative;
      background: linear-gradient(135deg, rgba(15, 15, 25, 0.95), rgba(25, 25, 45, 0.9));
      border: 1px solid rgba(var(--glow-rgb), 0.3);
      border-radius: 16px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      text-decoration: none;
    }
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, transparent, rgba(var(--glow-rgb), 0.4), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .game-card::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(var(--glow-rgb), 0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(var(--glow-rgb), 0.6);
      box-shadow:
        0 0 30px rgba(var(--glow-rgb), 0.15),
        0 0 60px rgba(var(--glow-rgb), 0.05),
        0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .game-card:hover::before { opacity: 1; }
    .game-card:hover::after { opacity: 1; }
    .game-card:hover .card-icon { transform: scale(1.1); }
    .game-card:hover .status-badge { background: rgba(var(--glow-rgb), 0.2); }

    .card-icon {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Title glow */
    .title-glow {
      text-shadow:
        0 0 20px rgba(0, 255, 255, 0.3),
        0 0 40px rgba(0, 255, 255, 0.1);
    }

    /* Scanline effect */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 255, 0.008) 2px,
        rgba(0, 255, 255, 0.008) 4px
      );
      z-index: 100;
    }

    /* Status badge pulse */
    .status-badge {
      transition: background 0.4s;
    }
    .status-dot {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Horizontal line accent */
    .line-accent {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
    }
  </style>
</head>
<body class="bg-grid min-h-screen flex flex-col items-center justify-center px-4 py-12 relative">

  <!-- Scanline overlay -->
  <div class="scanline"></div>

  <!-- Particles -->
  <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

  <!-- Main content -->
  <div class="relative z-10 w-full max-w-4xl mx-auto">

    <!-- Header -->
    <header class="text-center mb-12">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-8 h-px bg-gradient-to-r from-transparent to-cyan-400"></div>
        <span class="text-cyan-400 text-xs tracking-[0.3em] uppercase font-orbitron opacity-70">Card Game AI Lab</span>
        <div class="w-8 h-px bg-gradient-to-l from-transparent to-cyan-400"></div>
      </div>
      <h1 class="font-orbitron font-black text-4xl sm:text-5xl md:text-6xl text-white title-glow tracking-wider">
        TCG<span class="text-cyan-400">&times;</span>AI
      </h1>
      <p class="font-orbitron text-lg sm:text-xl text-gray-400 tracking-[0.4em] mt-2">PROJECT</p>
      <div class="line-accent w-64 mx-auto mt-6"></div>
    </header>

    <!-- Game cards grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 sm:gap-6">

      <!-- Disney Lorcana -->
      <a href="#" class="game-card card-disney block p-6 sm:p-8 group">
        <div class="relative z-10">
          <div class="flex items-start justify-between mb-4">
            <div class="card-icon w-12 h-12 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z" />
              </svg>
            </div>
            <span class="status-badge inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-500/20">
              <span class="status-dot w-1.5 h-1.5 rounded-full bg-purple-400"></span>
              <span class="text-purple-300 text-xs font-semibold tracking-wider uppercase">Coming Soon</span>
            </span>
          </div>
          <h2 class="font-orbitron font-bold text-xl sm:text-2xl text-white mb-1 tracking-wide">DISNEY LORCANA</h2>
          <p class="text-gray-500 text-sm tracking-widest uppercase">NISHIOKA</p>
        </div>
      </a>

      <!-- Gundam Arsenal Base -->
      <a href="#" class="game-card card-gundam block p-6 sm:p-8 group">
        <div class="relative z-10">
          <div class="flex items-start justify-between mb-4">
            <div class="card-icon w-12 h-12 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
              </svg>
            </div>
            <span class="status-badge inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-red-500/10 border border-red-500/20">
              <span class="status-dot w-1.5 h-1.5 rounded-full bg-red-400"></span>
              <span class="text-red-300 text-xs font-semibold tracking-wider uppercase">Development</span>
            </span>
          </div>
          <h2 class="font-orbitron font-bold text-xl sm:text-2xl text-white mb-1 tracking-wide">GUNDAM ARSENAL BASE</h2>
          <p class="text-gray-500 text-sm tracking-widest uppercase">SHIMOTATSU</p>
        </div>
      </a>

      <!-- One Piece Card Game -->
      <a href="https://onepiece-card-chatbot-git-main-starswirls-projects.vercel.app/" target="_blank" class="game-card card-onepiece block p-6 sm:p-8 group">
        <div class="relative z-10">
          <div class="flex items-start justify-between mb-4">
            <div class="card-icon w-12 h-12 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1.001A3.75 3.75 0 0012 18z" />
              </svg>
            </div>
            <span class="status-badge inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-amber-500/10 border border-amber-500/20">
              <span class="status-dot w-1.5 h-1.5 rounded-full bg-amber-400"></span>
              <span class="text-amber-300 text-xs font-semibold tracking-wider uppercase">Development</span>
            </span>
          </div>
          <h2 class="font-orbitron font-bold text-xl sm:text-2xl text-white mb-1 tracking-wide">ONE PIECE CARD GAME</h2>
          <p class="text-gray-500 text-sm tracking-widest uppercase">NICHIO</p>
        </div>
      </a>

      <!-- Pokémon Card Game -->
      <a href="#" class="game-card card-pokemon block p-6 sm:p-8 group">
        <div class="relative z-10">
          <div class="flex items-start justify-between mb-4">
            <div class="card-icon w-12 h-12 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center">
              <svg class="w-6 h-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-2.25-1.313M21 7.5v2.25m0-2.25l-2.25 1.313M3 7.5l2.25-1.313M3 7.5l2.25 1.313M3 7.5v2.25m9 3l2.25-1.313M12 12.75l-2.25-1.313M12 12.75V15m0 6.75l2.25-1.313M12 21.75V19.5m0 2.25l-2.25-1.313m0-16.875L12 2.25l2.25 1.313M21 14.25v2.25l-2.25 1.313m-13.5 0L3 16.5v-2.25" />
              </svg>
            </div>
            <span class="status-badge inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20">
              <span class="status-dot w-1.5 h-1.5 rounded-full bg-cyan-400"></span>
              <span class="text-cyan-300 text-xs font-semibold tracking-wider uppercase">Development</span>
            </span>
          </div>
          <h2 class="font-orbitron font-bold text-xl sm:text-2xl text-white mb-1 tracking-wide">POKEMON CARD GAME</h2>
          <p class="text-gray-500 text-sm tracking-widest uppercase">WAFU</p>
        </div>
      </a>

    </div>

    <!-- Footer -->
    <footer class="text-center mt-12">
      <div class="line-accent w-48 mx-auto mb-4"></div>
      <p class="text-gray-600 text-xs tracking-[0.2em] uppercase font-orbitron">&copy; 2026 TCG&times;AI App Dev Team</p>
    </footer>
  </div>

  <!-- Particle animation script -->
  <script>
    const container = document.getElementById('particles');
    const colors = ['#a855f7', '#ef4444', '#f59e0b', '#22d3ee', '#06b6d4'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
